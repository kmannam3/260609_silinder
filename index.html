<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HYDRAULIC PRECIS · 정밀 유압 솔루션</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
  <style>
/* ==========================================================
   Industrial Precision System — Hydraulic Precis
   ========================================================== */

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

:root {
  /* Surface */
  --surface: #faf9fb;
  --surface-dim: #dbd9dc;
  --surface-bright: #faf9fb;
  --surface-container-lowest: #ffffff;
  --surface-container-low: #f5f3f6;
  --surface-container: #efedf0;
  --surface-container-high: #e9e8ea;
  --surface-container-highest: #e3e2e5;

  /* Text on surface */
  --on-surface: #1b1c1e;
  --on-surface-variant: #43474d;
  --inverse-surface: #2f3033;
  --inverse-on-surface: #f2f0f3;

  /* Outline */
  --outline: #74777e;
  --outline-variant: #c4c6ce;

  /* Primary (Deep Navy) */
  --primary: #000f22;
  --on-primary: #ffffff;
  --primary-container: #0a2540;
  --on-primary-container: #768dad;
  --inverse-primary: #b0c8eb;

  /* Secondary (Action Blue) */
  --secondary: #0059bb;
  --on-secondary: #ffffff;
  --secondary-container: #0070ea;
  --on-secondary-container: #fefcff;

  /* Tertiary */
  --tertiary: #000f22;
  --on-tertiary: #ffffff;
  --tertiary-container: #142538;
  --on-tertiary-container: #7c8ca4;

  /* Error */
  --error: #ba1a1a;
  --on-error: #ffffff;
  --error-container: #ffdad6;
  --on-error-container: #93000a;

  /* Background */
  --background: #faf9fb;
  --on-background: #1b1c1e;

  /* Layout */
  --container-max: 1280px;
  --gutter: 24px;
  --margin-mobile: 16px;
  --margin-desktop: 48px;
  --section-padding: 80px;

  /* Spacing */
  --stack-sm: 8px;
  --stack-md: 16px;
  --stack-lg: 32px;

  /* Radius */
  --r-sm: 0.125rem;
  --r-default: 0.25rem;
  --r-md: 0.375rem;
  --r-lg: 0.5rem;
  --r-xl: 0.75rem;
  --r-full: 9999px;

  /* Shadow */
  --shadow-card: 0px 4px 20px rgba(0, 0, 0, 0.05);
}

/* ---------- Reset ---------- */
*,
*::before,
*::after {
  box-sizing: border-box;
}

html {
  -webkit-text-size-adjust: 100%;
  scroll-behavior: smooth;
}

body {
  margin: 0;
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 16px;
  font-weight: 400;
  line-height: 1.6;
  color: var(--on-surface);
  background-color: var(--background);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

h1, h2, h3, h4, h5, h6 {
  margin: 0;
  font-weight: 600;
  line-height: 1.3;
  letter-spacing: -0.01em;
}

p { margin: 0; }
a {
  color: inherit;
  text-decoration: none;
}
img, svg { display: block; max-width: 100%; }
button {
  font-family: inherit;
  cursor: pointer;
  border: none;
  background: none;
  padding: 0;
}
input, textarea, select {
  font-family: inherit;
}

/* ---------- Layout primitives ---------- */
.container {
  max-width: var(--container-max);
  margin: 0 auto;
  padding-left: var(--margin-desktop);
  padding-right: var(--margin-desktop);
}

.section {
  padding-top: var(--section-padding);
  padding-bottom: var(--section-padding);
}

.section-tight {
  padding-top: 56px;
  padding-bottom: 56px;
}

.eyebrow {
  font-size: 12px;
  font-weight: 700;
  line-height: 1;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--secondary);
}

.section-label {
  display: flex;
  align-items: baseline;
  gap: 16px;
  padding-bottom: 24px;
  border-bottom: 1px solid var(--outline-variant);
  margin-bottom: 40px;
}
.section-label h2 {
  font-size: 30px;
  font-weight: 700;
  color: var(--on-surface);
  letter-spacing: -0.01em;
}
.section-label .sublabel {
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.08em;
  color: var(--on-surface-variant);
}

/* ---------- Header ---------- */
.site-header {
  position: sticky;
  top: 0;
  z-index: 50;
  background: var(--surface);
  border-bottom: 1px solid var(--outline-variant);
}
.site-header .container {
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 72px;
}

.brand {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 0.08em;
  color: var(--primary);
}

.nav {
  display: flex;
  align-items: center;
  gap: 36px;
}
.nav a {
  font-size: 14px;
  font-weight: 500;
  color: var(--on-surface);
  padding: 6px 2px;
  position: relative;
  transition: color 200ms ease;
}
.nav a:hover { color: var(--secondary); }
.nav a.active {
  color: var(--secondary);
  font-weight: 600;
}
.nav a.active::after {
  content: '';
  position: absolute;
  bottom: -4px;
  left: 0;
  right: 0;
  height: 2px;
  background: var(--secondary);
}

.lang {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.06em;
  color: var(--on-surface-variant);
}
.lang svg { width: 16px; height: 16px; stroke: var(--on-surface-variant); }
.lang a { padding: 0 4px; transition: color 200ms ease; }
.lang a:hover { color: var(--secondary); }
.lang a.active { color: var(--secondary); text-decoration: underline; text-underline-offset: 3px; }
.lang .sep { color: var(--outline-variant); }

/* Mobile menu toggle */
.menu-toggle {
  display: none;
  width: 40px;
  height: 40px;
  align-items: center;
  justify-content: center;
}
.menu-toggle svg { width: 24px; height: 24px; stroke: var(--on-surface); }

/* ---------- Hero ---------- */
.hero {
  position: relative;
  overflow: hidden;
  color: var(--on-primary);
  background-color: var(--primary);
  min-height: 460px;
  display: flex;
  align-items: center;
}
.hero-bg {
  position: absolute;
  inset: 0;
  background:
    linear-gradient(180deg, rgba(0, 15, 34, 0.55) 0%, rgba(10, 37, 64, 0.7) 100%),
    radial-gradient(circle at 70% 50%, #1a3552 0%, #000f22 70%);
}
.hero-bg.industrial-1 {
  background:
    linear-gradient(135deg, rgba(0, 15, 34, 0.7) 0%, rgba(10, 37, 64, 0.55) 60%, rgba(0, 89, 187, 0.25) 100%),
    radial-gradient(ellipse at 65% 50%, #2a4a6e 0%, #0a2540 50%, #000f22 100%);
}
.hero-bg.industrial-2 {
  background:
    linear-gradient(180deg, rgba(0, 15, 34, 0.55) 0%, rgba(10, 37, 64, 0.65) 100%),
    radial-gradient(circle at 50% 70%, #34495c 0%, #1a2c40 50%, #0a1726 100%);
}
.hero-bg.dark-flat {
  background: var(--primary);
}
/* Subtle grid pattern overlay to evoke technical feel */
.hero-bg::after {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(176, 200, 235, 0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(176, 200, 235, 0.04) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none;
}

.hero .container {
  position: relative;
  z-index: 1;
  padding-top: 80px;
  padding-bottom: 80px;
  width: 100%;
}

.hero-eyebrow {
  display: inline-block;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--inverse-primary);
  padding: 6px 12px;
  background: rgba(176, 200, 235, 0.1);
  border: 1px solid rgba(176, 200, 235, 0.25);
  border-radius: var(--r-default);
  margin-bottom: 20px;
}
.hero h1 {
  font-size: 48px;
  font-weight: 700;
  line-height: 1.1;
  letter-spacing: -0.02em;
  color: #ffffff;
  margin-bottom: 18px;
  max-width: 720px;
}
.hero p {
  font-size: 16px;
  line-height: 1.6;
  color: rgba(255, 255, 255, 0.78);
  max-width: 540px;
  margin-bottom: 28px;
}
.hero-actions {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}

/* ---------- Buttons ---------- */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 12px 22px;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.02em;
  border-radius: var(--r-default);
  transition: background-color 200ms ease, color 200ms ease, border-color 200ms ease;
  border: 1px solid transparent;
  line-height: 1;
}
.btn-primary {
  background: var(--primary);
  color: var(--on-primary);
}
.btn-primary:hover { background: #1a2740; }
.btn-secondary {
  background: var(--secondary);
  color: var(--on-secondary);
}
.btn-secondary:hover { background: #014ea3; }
.btn-outline {
  background: transparent;
  color: var(--on-surface);
  border-color: var(--outline-variant);
}
.btn-outline:hover { border-color: var(--secondary); color: var(--secondary); }
.btn-outline-light {
  background: transparent;
  color: #ffffff;
  border-color: rgba(255, 255, 255, 0.35);
}
.btn-outline-light:hover { border-color: #ffffff; background: rgba(255, 255, 255, 0.08); }

/* ---------- Cards ---------- */
.card {
  background: var(--surface-container-lowest);
  border: 1px solid var(--outline-variant);
  border-radius: var(--r-default);
  padding: 28px;
  transition: box-shadow 200ms ease, border-color 200ms ease, transform 200ms ease;
}
.card:hover {
  box-shadow: var(--shadow-card);
  border-color: #aab0bb;
}

.card-icon-wrap {
  width: 48px;
  height: 48px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--surface-container-low);
  border-radius: var(--r-default);
  margin-bottom: 22px;
}
.card-icon-wrap svg {
  width: 22px;
  height: 22px;
  stroke: var(--on-surface);
  stroke-width: 1.6;
  fill: none;
}

.card h3 {
  font-size: 20px;
  font-weight: 700;
  color: var(--on-surface);
  margin-bottom: 10px;
  letter-spacing: -0.01em;
}
.card p {
  font-size: 14px;
  line-height: 1.6;
  color: var(--on-surface-variant);
}

.card-footer {
  margin-top: 24px;
  padding-top: 16px;
  border-top: 1px dashed var(--outline-variant);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--secondary);
}

/* ---------- Grids ---------- */
.grid {
  display: grid;
  gap: 24px;
}
.grid-3 { grid-template-columns: repeat(3, 1fr); }
.grid-4 { grid-template-columns: repeat(4, 1fr); }
.grid-2 { grid-template-columns: repeat(2, 1fr); }

/* ---------- Footer ---------- */
.site-footer {
  background: var(--primary-container);
  color: var(--on-primary-container);
  padding: 64px 0 32px;
  margin-top: 0;
}
.site-footer .container {
  display: grid;
  grid-template-columns: 1.4fr 1fr 1fr 1.2fr;
  gap: 48px;
  align-items: start;
}
.site-footer h4 {
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: rgba(255, 255, 255, 0.7);
  margin-bottom: 18px;
}
.site-footer .brand-block .brand-label {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 0.08em;
  color: #ffffff;
  display: block;
  margin-bottom: 14px;
}
.site-footer .brand-block p {
  font-size: 14px;
  line-height: 1.7;
  color: var(--on-primary-container);
  margin-bottom: 22px;
  max-width: 320px;
}
.footer-socials {
  display: flex;
  gap: 14px;
}
.footer-socials a {
  width: 36px;
  height: 36px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border: 1px solid rgba(255, 255, 255, 0.18);
  border-radius: var(--r-default);
  color: var(--on-primary-container);
  transition: background 200ms, color 200ms;
}
.footer-socials a:hover { background: rgba(255, 255, 255, 0.08); color: #ffffff; }
.footer-socials svg { width: 16px; height: 16px; stroke: currentColor; stroke-width: 1.6; fill: none; }

.site-footer ul { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 12px; }
.site-footer li a {
  font-size: 14px;
  color: var(--on-primary-container);
  transition: color 200ms;
}
.site-footer li a:hover { color: #ffffff; }

.site-footer .contact-block address {
  font-style: normal;
  font-size: 14px;
  line-height: 1.7;
  color: var(--on-primary-container);
}

.copyright {
  margin-top: 56px;
  padding-top: 24px;
  border-top: 1px solid rgba(255, 255, 255, 0.1);
  text-align: center;
  font-size: 12px;
  color: rgba(255, 255, 255, 0.5);
  letter-spacing: 0.04em;
}
.copyright .container { display: block; }

/* ---------- Common section heading ---------- */
.section-heading {
  text-align: center;
  margin-bottom: 56px;
}
.section-heading h2 {
  font-size: 36px;
  font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--on-surface);
  margin-bottom: 12px;
}
.section-heading p {
  font-size: 14px;
  color: var(--on-surface-variant);
}

/* ---------- Responsive ---------- */
@media (max-width: 960px) {
  :root { --section-padding: 64px; }
  .container { padding-left: 24px; padding-right: 24px; }
  .hero h1 { font-size: 36px; line-height: 1.2; }
  .hero .container { padding-top: 60px; padding-bottom: 60px; }
  .grid-3, .grid-4 { grid-template-columns: 1fr 1fr; }
  .nav { display: none; }
  .menu-toggle { display: inline-flex; }
  .site-footer .container { grid-template-columns: 1fr 1fr; }
  .section-heading h2 { font-size: 28px; }
}

@media (max-width: 640px) {
  .container { padding-left: 16px; padding-right: 16px; }
  .hero h1 { font-size: 28px; }
  .grid-3, .grid-4, .grid-2 { grid-template-columns: 1fr; }
  .site-footer .container { grid-template-columns: 1fr; gap: 36px; }
  .section-label { flex-direction: column; gap: 4px; align-items: flex-start; }
}

/* ==========================================================
   PAGE: HOME (index.html)
   ========================================================== */
.home-hero {
  min-height: 560px;
}
.home-hero .hero-bg {
  background:
    linear-gradient(135deg, rgba(0, 15, 34, 0.6) 0%, rgba(10, 37, 64, 0.45) 60%, rgba(0, 89, 187, 0.25) 100%),
    radial-gradient(ellipse at 65% 50%, #f59e0b22 0%, transparent 40%),
    radial-gradient(ellipse at 50% 50%, #5d7595 0%, #2a3f5a 35%, #0a1d33 70%, #000a18 100%);
}

.about-section {
  background: var(--surface-container-lowest);
}
.about-grid {
  display: grid;
  grid-template-columns: 1.1fr 1fr;
  gap: 64px;
  align-items: center;
}
.about-content .eyebrow { margin-bottom: 14px; display: block; }
.about-content h2 {
  font-size: 36px;
  font-weight: 700;
  line-height: 1.2;
  letter-spacing: -0.02em;
  margin-bottom: 20px;
}
.about-content p {
  font-size: 16px;
  line-height: 1.7;
  color: var(--on-surface-variant);
  margin-bottom: 36px;
}
.stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 24px;
  padding-top: 24px;
  border-top: 1px solid var(--outline-variant);
}
.stat-num {
  font-size: 36px;
  font-weight: 700;
  color: var(--primary);
  letter-spacing: -0.02em;
  line-height: 1;
  margin-bottom: 6px;
}
.stat-label {
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.08em;
  color: var(--on-surface-variant);
  text-transform: uppercase;
}

.about-visual {
  aspect-ratio: 4/3;
  border-radius: var(--r-lg);
  background:
    linear-gradient(135deg, rgba(0, 15, 34, 0.5) 0%, rgba(10, 37, 64, 0.3) 100%),
    radial-gradient(circle at 40% 50%, #4a6585 0%, #1a2e4a 50%, #0a1726 100%);
  position: relative;
  overflow: hidden;
  border: 1px solid var(--outline-variant);
}
.about-visual::after {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(176, 200, 235, 0.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(176, 200, 235, 0.06) 1px, transparent 1px);
  background-size: 32px 32px;
}

/* Product gallery on home */
.product-gallery {
  background: var(--surface-container-low);
}
.product-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
}
.product-tile {
  position: relative;
  border-radius: var(--r-lg);
  overflow: hidden;
  min-height: 280px;
  display: flex;
  align-items: flex-end;
  padding: 28px;
  color: #ffffff;
  isolation: isolate;
  cursor: pointer;
  border: 1px solid var(--outline-variant);
  transition: transform 200ms ease, box-shadow 200ms ease;
}
.product-tile:hover {
  transform: translateY(-2px);
  box-shadow: 0 12px 32px rgba(0, 15, 34, 0.18);
}
.product-tile::before {
  content: '';
  position: absolute;
  inset: 0;
  z-index: -1;
}
.product-tile::after {
  content: '';
  position: absolute;
  inset: 0;
  z-index: -1;
  background: linear-gradient(180deg, rgba(0, 15, 34, 0.2) 0%, rgba(0, 15, 34, 0.85) 100%);
}
.product-tile.t1::before {
  background:
    radial-gradient(circle at 30% 30%, #5b7a99 0%, #2c4259 50%, #0d1d2e 100%);
}
.product-tile.t2::before {
  background:
    radial-gradient(circle at 65% 40%, #34495c 0%, #1a2c40 50%, #0a1726 100%);
}
.product-tile.t3::before {
  background:
    radial-gradient(circle at 70% 60%, #2b4a6e 0%, #142a44 50%, #0a1726 100%);
}
.product-tile.t4::before {
  background:
    radial-gradient(ellipse at 50% 50%, #2e6da4 0%, #143055 50%, #061122 100%);
}
.product-tile .tile-cat {
  display: inline-block;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 5px 10px;
  border: 1px solid rgba(255, 255, 255, 0.3);
  border-radius: var(--r-default);
  background: rgba(0, 0, 0, 0.25);
  margin-bottom: 10px;
  color: #ffffff;
}
.product-tile h3 {
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 8px;
  color: #ffffff;
}
.product-tile p {
  font-size: 14px;
  line-height: 1.6;
  color: rgba(255, 255, 255, 0.75);
  max-width: 280px;
}

/* Core tech */
.core-tech-grid {
  display: grid;
  grid-template-columns: 1fr 2fr;
  gap: 64px;
  align-items: start;
}
.core-tech-grid .lead h2 {
  font-size: 30px;
  font-weight: 700;
  letter-spacing: -0.01em;
  margin-bottom: 12px;
}
.core-tech-grid .lead p {
  font-size: 14px;
  color: var(--on-surface-variant);
}
.core-tech-list {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 32px;
}
.core-tech-item {
  display: flex;
  gap: 16px;
}
.core-tech-item .icon {
  flex-shrink: 0;
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--surface-container-low);
  border-radius: var(--r-default);
}
.core-tech-item .icon svg { width: 18px; height: 18px; stroke: var(--secondary); stroke-width: 1.6; fill: none; }
.core-tech-item h4 {
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 4px;
}
.core-tech-item p {
  font-size: 13px;
  color: var(--on-surface-variant);
  line-height: 1.6;
}

/* Location section */
.location-section {
  background: var(--surface-container-low);
}
.location-grid {
  display: grid;
  grid-template-columns: 1fr 1.4fr;
  gap: 32px;
  background: var(--surface-container-lowest);
  border: 1px solid var(--outline-variant);
  border-radius: var(--r-lg);
  overflow: hidden;
}
.location-content {
  padding: 40px;
}
.location-content h3 {
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 14px;
}
.location-content p {
  font-size: 14px;
  color: var(--on-surface-variant);
  line-height: 1.6;
  margin-bottom: 28px;
}
.location-info { display: flex; flex-direction: column; gap: 14px; }
.location-info .row {
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 14px;
  color: var(--on-surface);
}
.location-info .row svg { width: 16px; height: 16px; stroke: var(--secondary); flex-shrink: 0; }

.map-stub {
  min-height: 320px;
  background:
    linear-gradient(180deg, #e9eef5 0%, #dde4ed 100%);
  position: relative;
  overflow: hidden;
}

.product-cards {

.product-card {

    linear-gradient(180deg, #2c3e52 0%, #1a2838 100%);
}

  left: 50%;
